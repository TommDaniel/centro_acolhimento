services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: php artisan serve --host=0.0.0.0 --port=8000

  vite:
    image: node:22-alpine
    working_dir: /app
    user: "1000:1000"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev -- --host"
    profiles: ["dev"]
